<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Light Mode Gradient -->
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Dark Mode Gradient -->
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>

    <!-- Growth Line Gradient -->
    <linearGradient id="growthGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <style>
      .calc-body { fill: url(#lightGradient); }
      .calc-screen { fill: #f8fafc; }
      .calc-button { fill: #ffffff; opacity: 0.2; }
      .growth-line { stroke: url(#growthGradient); stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .growth-dot { fill: #10b981; }

      @media (prefers-color-scheme: dark) {
        .calc-body { fill: url(#darkGradient); }
        .calc-screen { fill: #1e293b; }
        .calc-button { fill: #000000; opacity: 0.2; }
      }
    </style>
  </defs>

  <!-- Calculator Body -->
  <rect x="15" y="10" width="70" height="80" rx="12" class="calc-body" />
  
  <!-- Screen Area -->
  <rect x="25" y="20" width="50" height="25" rx="4" class="calc-screen" />
  
  <!-- Buttons -->
  <rect x="25" y="55" width="12" height="12" rx="3" class="calc-button" />
  <rect x="25" y="72" width="12" height="12" rx="3" class="calc-button" />
  
  <rect x="44" y="55" width="12" height="12" rx="3" class="calc-button" />
  <rect x="44" y="72" width="12" height="12" rx="3" class="calc-button" />
  
  <rect x="63" y="55" width="12" height="29" rx="3" class="calc-button" />

  <!-- Growth Chart overlaying the screen -->
  <path d="M 30,38 L 45,28 L 55,32 L 70,22" class="growth-line" />
  <circle cx="70" cy="22" r="4" class="growth-dot" />
</svg>
